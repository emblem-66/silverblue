name: rechunk build container

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout source
      uses: actions/checkout@v6

    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.0

    - name: Build image with Podman
      id: build
      run: |
        set -euo pipefail
        podman build \
          -f Containerfile \
          -t localbuild:latest \
          --iidfile imageid.txt .
        echo "local_digest=$(cat imageid.txt)" >> "$GITHUB_OUTPUT"

    - name: Rechunk image
      id: rechunk
      run: |
        set -euo pipefail
        podman run --rm \
          --mount=type=image,source=localbuild:latest,target=/chunkah \
          -e CHUNKAH_CONFIG_STR="$(podman inspect localbuild:latest)" \
          quay.io/jlebon/chunkah build --max-layers 100 | podman load

    - name: Tag image for GHCR
      run: |
        podman tag localbuild:latest ghcr.io/${{ github.repository }}:latest

    - name: Push image to GHCR
      id: push
      run: |
        set -euo pipefail
        DIGEST=$(podman push \
          --creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
          ghcr.io/${{ github.repository }}:latest | \
          grep -o 'sha256:[a-f0-9]\+')
        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

    - name: Sign pushed image with Cosign (keyless)
      run: |
        cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
