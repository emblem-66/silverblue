name: rechunk build container

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG: latest
  LOCAL_TAG: localbuild:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.0

    - name: Build image with Podman
      id: build
      run: |
        set -euo pipefail
        podman build \
          -f Containerfile \
          -t "${LOCAL_TAG}" \
          --iidfile imageid.txt .
        echo "local_digest=$(cat imageid.txt)" >> "$GITHUB_OUTPUT"

    - name: Rechunk image
      id: rechunk
      run: |
        set -euo pipefail
        podman run --rm \
          --mount=type=image,source="${LOCAL_TAG}",target=/chunkah \
          -e CHUNKAH_CONFIG_STR="$(podman inspect ${LOCAL_TAG})" \
          quay.io/jlebon/chunkah build --max-layers 100 | podman load

    - name: Tag image for GHCR
      run: |
        podman tag "${LOCAL_TAG}" "${REGISTRY}/${IMAGE_NAME}:${TAG}"

    - name: Push image to GHCR
      id: push
      run: |
        set -euo pipefail
        DIGEST=$(podman push \
          --creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
          "${REGISTRY}/${IMAGE_NAME}:${TAG}" | \
          grep -o 'sha256:[a-f0-9]\+')
        echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

    - name: Sign pushed image with Cosign (keyless)
      run: |
        cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${{ steps.push.outputs.digest }}"
