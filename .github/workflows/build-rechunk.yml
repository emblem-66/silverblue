name: rechunk build container

on:
  workflow_dispatch:
#  schedule:
#    - cron: "0 0 * * *"

env:
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ github.token }}
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: |
        set -euo pipefail
        podman build -f Containerfile -t localbuild:latest .

    - name: Rechunk
      run: |
        set -euo pipefail
        podman run --rm \
          --mount=type=image,source=localbuild:latest,target=/chunkah \
          -e CHUNKAH_CONFIG_STR="$(podman inspect localbuild:latest)" \
          quay.io/coreos/chunkah build --max-layers 100 | podman load

    - name: Tag
      run: |
        set -euo pipefail
        podman tag localbuild:latest ghcr.io/${{ github.repository }}:latest

    - name: Push
      run: |
        set -euo pipefail
        podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ github.repository }}:latest




